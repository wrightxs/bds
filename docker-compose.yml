version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: stock_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stock_analysis}
      MYSQL_USER: ${MYSQL_USER:-stock_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stock_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_backend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-stock_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stock_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stock_analysis}
      DATA_SOURCE: ${DATA_SOURCE:-akshare}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
